name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          CUTOFF=$(date -u -d "${RETAIN_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)
          JQ_FILTER='sort_by(.createdAt) | reverse | .['"${KEEP_MINIMUM}"':] | .[] | select(.createdAt < "'"${CUTOFF}"'") | .databaseId'
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt --limit 200 \
            --jq "${JQ_FILTER}" \
          | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"
