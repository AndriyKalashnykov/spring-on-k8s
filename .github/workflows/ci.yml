name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  schedule:
    # Weekly CVE scan — Mondays 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs full git history

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Static check
        run: make static-check

  build:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build
        run: make build

  test:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Test
        run: make test

  integration-test:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Integration test
        run: make integration-test

  e2e:
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: E2E
        run: make e2e

  cve-check:
    # Runs on tags (release gate), weekly schedule, or manual dispatch.
    # Skipped on normal pushes/PRs — slow path can take 15+ min without NVD_API_KEY.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache NVD database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-db-${{ hashFiles('pom.xml') }}
          restore-keys: nvd-db-

      - name: CVE check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: make cve-check

  docker:
    # Gates 1-3 (build + Trivy + smoke) and Gate 4 build validation run on every push.
    # Gate 4 push and Gate 5 cosign signing are tag-gated at step level.
    needs: [static-check, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write   # exercised only by the tag-gated push step
      id-token: write   # exercised only by the tag-gated cosign sign step
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: latest=${{ startsWith(github.ref, 'refs/tags/') }}

      # Gate 1: single-arch load-local build for scanning and smoke testing.
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: spring-on-k8s:ci-scan
          build-args: |
            JDK_VENDOR=eclipse-temurin
            JDK_VERSION=21
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 2: Trivy image scan — CRITICAL/HIGH blocks the release.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: spring-on-k8s:ci-scan
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      # Gate 3: smoke test — readiness endpoint reports UP within 60s.
      - name: Smoke test
        run: |
          docker run -d --rm --name smoke -p 8080:8080 spring-on-k8s:ci-scan
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health/readiness | grep -q '"status":"UP"'; then
              echo "Smoke test PASS: /actuator/health/readiness reports UP"
              docker stop smoke
              exit 0
            fi
            sleep 2
          done
          echo "Smoke test FAIL: /actuator/health/readiness did not report UP within 60s"
          docker logs smoke || true
          docker stop smoke || true
          exit 1

      # Gate 4: multi-arch build always runs (catches arm64 cross-compile
      # regressions early); push is tag-gated via step-level conditional.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JDK_VENDOR=eclipse-temurin
            JDK_VERSION=21
          # Pattern A default: clean image index so GHCR "OS / Arch" tab
          # renders. Cosign keyless signing (below) covers supply-chain
          # verification without buildkit in-manifest attestations.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 5: cosign keyless OIDC signing — tag-only.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    # Note: cve-check is intentionally NOT in `needs:`. Transient external-dep
    # issues (NVD slow responses, Sonatype OSS Index rate limits returning
    # HTTP 401) should not block a release. cve-check still runs and produces
    # security signal; failure is visible in the run UI but doesn't gate
    # ci-pass / branch protection.
    if: always()
    needs: [static-check, build, test, integration-test, e2e, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check upstream jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more upstream jobs failed"
            exit 1
          fi
          echo "All upstream jobs succeeded or were skipped."
