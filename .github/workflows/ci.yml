name: CI

on:
  # Note: NO trigger-level `paths-ignore`. Under Repository Rulesets requiring
  # `ci-pass`, doc-only changes filtered at the trigger level produce no
  # workflow run → no `ci-pass` status → required check reports "expected,
  # not received" indefinitely (admin override is also rejected). Path
  # filtering is moved into the `changes` job below; doc-only changes still
  # produce a green `ci-pass` because heavy jobs are skipped (skipped !=
  # failed) and `ci-pass` only blocks on failure/cancelled.
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  schedule:
    # Weekly CVE scan — Mondays 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter needs this on PR events

env:
  # Tracked by Renovate via the workflow customManager in renovate.json — bumped
  # in tandem with the Makefile `ZAP_VERSION` (same depName + currentValue, so
  # the bumps land in a single PR by default).
  # renovate: datasource=github-releases depName=zaproxy/zaproxy extractVersion=^v(?<version>.*)$
  ZAP_VERSION: 2.17.0

jobs:
  changes:
    # Detect whether the change set includes any code paths. Heavy jobs gate
    # on `needs.changes.outputs.code == 'true'`; doc-only changes skip them.
    # On tag pushes, schedules, and workflow_dispatch we force code=true so
    # release / CVE scan / manual runs are never skipped by accident.
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.combine.outputs.code }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: filter
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # Default 'some' semantics: `code` = true if ANY changed file matches
          # the include rules below. Negative patterns prefixed with `!` exclude
          # doc-only paths from contributing to the match. Native paths-filter
          # syntax — does not depend on extglob, predicate-quantifier, or other
          # version-specific features.
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!specs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.claudeignore'
              - '!.claude/**'
              - '!benchmarks/**'
              - '!**.png'
              - '!**.jpg'
              - '!**.gif'
              - '!**.svg'
              - 'CLAUDE.md'

      - name: Compute changes output
        id: combine
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" || "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
          fi

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs full git history

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build
        run: make build

  test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Integration test
        run: make integration-test

  e2e:
    needs: [changes, build, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run e2e tests
        run: make e2e

  cve-check:
    # Runs on tags (release gate), weekly schedule, or manual dispatch.
    # Skipped on normal pushes/PRs — slow path can take 15+ min without NVD_API_KEY.
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache NVD database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-db-${{ hashFiles('pom.xml') }}
          restore-keys: nvd-db-

      - name: CVE check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: make cve-check

  docker:
    # Gates 1-3 (build + Trivy + smoke), DAST (OWASP ZAP baseline), and Gate 4
    # amd64 build validation run on every push. Gate 4 push and Gate 5 cosign
    # signing are tag-gated at step level. Single-arch (linux/amd64) publish —
    # multi-arch is deliberately disabled (single image index, no QEMU
    # cross-compile cost; setup-qemu is loaded for future-proofing only).
    # `cve-check` is in `needs:` so a real CVE failure on a tag push blocks the
    # release. The `if:` uses `!failure() && !cancelled()` so cve-check being
    # `skipped` on regular pushes (it's tag/schedule/manual-only) does not skip
    # the docker job. DAST steps are gated by `vars.ACT != 'true'` so local
    # `make ci-run` skips ZAP (its docker-in-docker bind mount does not
    # round-trip through the host Docker daemon under act).
    needs: [changes, static-check, build, test, cve-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write   # exercised only by the tag-gated push step
      id-token: write   # exercised only by the tag-gated cosign sign step
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: latest=${{ startsWith(github.ref, 'refs/tags/') }}

      # Gate 1: single-arch load-local build for scanning and smoke testing.
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: spring-on-k8s:ci-scan
          build-args: |
            JDK_VENDOR=eclipse-temurin
            JDK_VERSION=21
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 2: Trivy image scan — CRITICAL/HIGH blocks the release.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: spring-on-k8s:ci-scan
          format: table
          exit-code: '1'
          scanners: 'vuln,secret,misconfig'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      # Gate 3: smoke test — boots image, polls /actuator/health/readiness for UP within 60s.
      # Implementation lives in `make docker-smoke-test` so the same target runs locally.
      # The container is left running so the DAST step below can scan it.
      - name: Smoke test
        run: make docker-smoke-test

      # DAST: OWASP ZAP baseline scan against the running smoke container.
      # Skipped under act — ZAP's docker-in-docker bind mount of
      # $GITHUB_WORKSPACE/zap-output does not round-trip through the host Docker
      # daemon. Run `make dast` directly to cover that ground locally. `-I`
      # (warn-only, set inside `make dast-scan`) means only FAIL findings block.
      - name: Cache ZAP image
        if: vars.ACT != 'true'
        id: cache-zap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        if: vars.ACT != 'true'
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        if: vars.ACT != 'true'
        run: make dast-scan

      - name: Upload DAST report
        if: always() && vars.ACT != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f spring-on-k8s-smoke 2>/dev/null || true

      # Gate 4: amd64 build always runs to catch build regressions on the
      # runner architecture; push is tag-gated via step-level conditional.
      # Multi-arch (amd64+arm64) is intentionally NOT enabled — single-arch
      # publish keeps the image index minimal and the build fast.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JDK_VENDOR=eclipse-temurin
            JDK_VERSION=21
          # Pattern A default: clean image index so GHCR "OS / Arch" tab
          # renders. Cosign keyless signing (below) covers supply-chain
          # verification without buildkit in-manifest attestations.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 5: cosign keyless OIDC signing — tag-only.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    # Branch-protection / Repository Rulesets aggregator. Lists every upstream
    # job in `needs:` so a failure or cancellation in any of them blocks the
    # gate. Skipped jobs (e.g., heavy jobs on doc-only changes via the
    # `changes` filter; cve-check on non-tag pushes) are treated as PASS —
    # this is what makes doc-only PRs mergeable while still requiring CI on
    # code changes.
    if: always()
    needs: [changes, static-check, build, test, integration-test, e2e, cve-check, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more upstream jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more upstream jobs were cancelled"
            exit 1
          fi
          echo "All upstream jobs succeeded or were skipped."
