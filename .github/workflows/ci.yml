name: CI

on:
  # Note: NO trigger-level `paths-ignore`. Under Repository Rulesets requiring
  # `ci-pass`, doc-only changes filtered at the trigger level produce no
  # workflow run → no `ci-pass` status → required check reports "expected,
  # not received" indefinitely (admin override is also rejected). Path
  # filtering is moved into the `changes` job below; doc-only changes still
  # produce a green `ci-pass` because heavy jobs are skipped (skipped !=
  # failed) and `ci-pass` only blocks on failure/cancelled.
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  # A published GitHub Release is also a "release" for the cve-check + docker
  # gates (in addition to a v* tag push). On a `release` event github.ref is the
  # tag ref (refs/tags/<tag>), so the same `startsWith(github.ref,'refs/tags/')`
  # step-level publish/sign gates fire. If a release is cut by pushing a tag AND
  # then publishing a Release on the same ref, both events share the
  # `CI-<ref>` concurrency group below — cancel-in-progress dedups them so the
  # signed image publishes once.
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter needs this on PR events

env:
  # Tracked by Renovate via the workflow customManager in renovate.json — bumped
  # in tandem with the Makefile `ZAP_VERSION` (same depName + currentValue, so
  # the bumps land in a single PR by default).
  # renovate: datasource=github-releases depName=zaproxy/zaproxy extractVersion=^v(?<version>.*)$
  ZAP_VERSION: 2.17.0

jobs:
  changes:
    # Detect whether the change set includes any code paths. Heavy jobs gate
    # on `needs.changes.outputs.code == 'true'`; doc-only changes skip them.
    # On tag pushes and workflow_dispatch we force code=true so release /
    # manual runs are never skipped by accident.
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.combine.outputs.code }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: filter
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # `base:` is required by `act` (which seeds a synthetic event without
          # `repository.default_branch`); on real push events we set it to `main`,
          # on real PR events we explicitly clear it (the input is ignored on PR
          # events and emits a "passed with annotations" warning if set). See
          # `/ci-workflow` skill §15e.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          # Default 'some' semantics: `code` = true if ANY changed file matches
          # the include rules below. Negative patterns prefixed with `!` exclude
          # doc-only paths from contributing to the match. Native paths-filter
          # syntax — does not depend on extglob, predicate-quantifier, or other
          # version-specific features.
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!specs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.claudeignore'
              - '!.claude/**'
              - '!benchmarks/**'
              - '!**.png'
              - '!**.jpg'
              - '!**.gif'
              - '!**.svg'
              - 'CLAUDE.md'
              # Re-include PlantUML diagram sources so a .puml-only edit still
              # flips code=true and runs static-check's diagrams-check drift gate
              # (otherwise the !docs/** exclusion would skip it). See
              # /architecture-diagrams skill "drift gate only fires if .puml is in code path".
              - 'docs/diagrams/**/*.puml'

      - name: Compute changes output
        id: combine
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "release" || "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
          fi

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # gitleaks needs full git history

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build
        run: make build

  test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Integration test
        run: make integration-test

  e2e:
    needs: [changes, build, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: E2E test
        run: make e2e

  cve-check:
    # Release gate: runs ONLY on a v* tag push or a published GitHub Release.
    # Skipped on normal pushes/PRs and manual workflow_dispatch, and no longer
    # runs on a weekly schedule — the security scan is intentionally a
    # release-only gate, not a periodic or on-demand job. (Locally,
    # `make ci-run-tag` exercises it via a simulated tag event under act.)
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release')
    runs-on: ubuntu-latest
    # 45m (not 30m) gives headroom for a cold NVD download (~20-30m of 360k+
    # records when the cache misses) plus one purge + re-download or cached-DB
    # fallback by scripts/cve-check.sh on a transient NVD outage.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      # NVD vuln DB is independent of project deps — key on the ISO week, not
      # pom.xml. Keying on hashFiles('pom.xml') evicts the ~hundreds-of-MB DB on
      # every dependency bump and forces a cold NVD fetch (~30 min, rate-limit
      # prone). The ISO-week key with a `nvd-db-` restore-keys fallback keeps a
      # warm DB across release runs and refreshes it weekly; scripts/cve-check.sh
      # self-heals a transient NVD outage by scanning that cached DB.
      # If an interrupted update ever poisons the H2 tarball (rule 3:
      # `MVStoreException`), version-prefix this key (`nvd-db-` -> `nvd-db-v2-`,
      # both lines) to orphan it — but NOT during an active NVD outage, since a
      # prefix bump empties the cache and removes the fallback DB the script
      # needs (the rule-3/rule-4 interaction). Reach for the prefix bump only on
      # the actual `MVStoreException` corruption signature, not preemptively.
      - name: Compute NVD cache key (ISO week)
        id: nvdkey
        run: echo "week=$(date -u +%Y-%V)" >> "$GITHUB_OUTPUT"

      - name: Cache NVD database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-db-${{ steps.nvdkey.outputs.week }}
          restore-keys: nvd-db-

      - name: CVE check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: make cve-check

  docker:
    # Release-time job: runs ONLY on a v* tag push or a published GitHub Release
    # — not on regular pushes/PRs or manual dispatch. Gates 1-3 (build + Trivy + smoke), DAST
    # (OWASP ZAP baseline), and Gate 4 amd64 build validation run on every tag
    # build; Gate 4 push and Gate 5 cosign signing are additionally tag-gated at
    # step level (kept as belt-and-suspenders). Single-arch (linux/amd64)
    # publish — multi-arch is deliberately disabled (single image index, no QEMU
    # cross-compile cost; setup-qemu is loaded for future-proofing only).
    # `cve-check` is in `needs:` so a real CVE failure on a tag push blocks the
    # release. The `if:` uses `!failure() && !cancelled()` so an upstream failure
    # is still honored. DAST steps are gated by `vars.ACT != 'true'` so local
    # `make ci-run` skips ZAP (its docker-in-docker bind mount does not
    # round-trip through the host Docker daemon under act); `make ci-run-tag`
    # exercises this job locally via a simulated tag event.
    needs: [changes, static-check, build, test, cve-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write   # exercised only by the tag-gated push step
      id-token: write   # exercised only by the tag-gated cosign sign step
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Provision .mise.toml tools (container-structure-test) and, critically,
      # authenticate mise's GitHub API calls with the job token — an
      # unauthenticated `mise install` (triggered by `make ... -> deps`) hits
      # GitHub's 60-req/hr anonymous limit and fails the job intermittently.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: latest=${{ startsWith(github.ref, 'refs/tags/') }}

      # Gate 1: single-arch load-local build for scanning and smoke testing.
      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: spring-on-k8s:ci-scan
          build-args: |
            JDK_VENDOR=eclipse-temurin
            JDK_VERSION=21
            APK_UPGRADE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 2: Trivy image scan — CRITICAL/HIGH blocks the release.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: spring-on-k8s:ci-scan
          format: table
          exit-code: '1'
          scanners: 'vuln,secret,misconfig'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      # Image-contract assertions — the Dockerfile contract (USER, exposed
      # port, entrypoint, workdir, file existence, Java 25 runtime) on the
      # built image. Orthogonal to the Trivy scan (CVEs) and the smoke test
      # (runtime behaviour). Runs `make docker-structure-test` so the same
      # check is reproducible locally.
      - name: Image contract test
        run: make docker-structure-test

      # Gate 3: smoke test — boots image, polls /actuator/health/readiness for UP within 60s.
      # Implementation lives in `make docker-smoke-test` so the same target runs locally.
      # The container is left running so the DAST step below can scan it.
      - name: Smoke test
        run: make docker-smoke-test

      # DAST: OWASP ZAP baseline scan against the running smoke container.
      # Skipped under act — ZAP's docker-in-docker bind mount of
      # $GITHUB_WORKSPACE/zap-output does not round-trip through the host Docker
      # daemon. Run `make dast` directly to cover that ground locally. `-I`
      # (warn-only, set inside `make dast-scan`) means only FAIL findings block.
      - name: Cache ZAP image
        if: vars.ACT != 'true'
        id: cache-zap
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        if: vars.ACT != 'true'
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        if: vars.ACT != 'true'
        run: make dast-scan

      - name: Upload DAST report
        if: always() && vars.ACT != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f spring-on-k8s-smoke 2>/dev/null || true

      # Gate 4: amd64 build always runs to catch build regressions on the
      # runner architecture; push is tag-gated via step-level conditional.
      # Multi-arch (amd64+arm64) is intentionally NOT enabled — single-arch
      # publish keeps the image index minimal and the build fast.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JDK_VENDOR=eclipse-temurin
            JDK_VERSION=21
            APK_UPGRADE_BUST=${{ github.run_id }}
          # Pattern A default: clean image index so GHCR "OS / Arch" tab
          # renders. Cosign keyless signing (below) covers supply-chain
          # verification without buildkit in-manifest attestations.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 5: cosign keyless OIDC signing — tag-only.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    # Branch-protection / Repository Rulesets aggregator. Lists every upstream
    # job in `needs:` so a failure or cancellation in any of them blocks the
    # gate. Skipped jobs (e.g., heavy jobs on doc-only changes via the
    # `changes` filter; cve-check and docker on every non-tag event) are
    # treated as PASS — this is what makes doc-only PRs mergeable while
    # still requiring CI on code changes.
    if: always()
    needs: [changes, static-check, build, test, integration-test, e2e, cve-check, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more upstream jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more upstream jobs were cancelled"
            exit 1
          fi
          echo "All upstream jobs succeeded or were skipped."
