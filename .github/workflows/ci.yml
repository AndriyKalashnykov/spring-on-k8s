name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'

      # Bootstrap: Maven must exist before Makefile targets can run.
      # GitHub runners have it pre-installed; this only executes in act containers.
      - name: Install Maven
        run: |
          if ! command -v mvn &>/dev/null; then
            MVN_VER=3.9.9
            curl -sSfL "https://archive.apache.org/dist/maven/maven-3/${MVN_VER}/binaries/apache-maven-${MVN_VER}-bin.tar.gz" | sudo tar xz -C /opt
            echo "/opt/apache-maven-${MVN_VER}/bin" >> "$GITHUB_PATH"
          fi

      - name: Cache Maven packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        env:
          cache-name: cache-mvn-temu
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Build with Make
        run: make build

      - name: Test with Make
        run: make test

      - name: Lint with Make
        run: make lint
